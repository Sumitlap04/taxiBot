<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - TaxiBot</title>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-glass-card">
            
            <div class="login-header">
                <img src="logo.png" alt="TaxiBot Logo" class="login-logo">
                <h1>TaxiBot</h1>
                <p>Sign in to your AI Concierge</p>
            </div>
            
            <form id="login-form" class="login-form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <div class="forgot-password">
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-primary login-btn">Sign In</button>
                
                <div class="divider">
                    <span>or continue with</span>
                </div>

                <button type="button" class="btn-secondary google-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-1 7.28-2.69l-3.57-2.77c-.99.69-2.26 1.1-3.71 1.1-2.87 0-5.3-1.94-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.11c-.22-.69-.35-1.43-.35-2.11s.13-1.42.35-2.11V7.05H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.95l3.66-2.84z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.05l3.66 2.84c.87-2.6 3.3-4.51 6.16-4.51z"/></svg>
                    Google
                </button>
            </form>
            
            <div class="signup-prompt">
                <p>New to TaxiBot? <a href="#">Create an account</a></p>
            </div>
            
        </div>
    </div>
    
    <script>
        // If already logged in, skip to chatbot
        if (localStorage.getItem('taxibot_user')) {
            window.location.href = 'chatbot.html';
        }

        // Email/Password auth
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            localStorage.setItem('taxibot_user', email || 'User');
            window.location.href = 'chatbot.html';
        });

        // Google Identity Services - OAuth 2.0 Auth Flow for Custom UI Button
        let googleClient;
        window.onload = function () {
            // NOTE: Replace 'YOUR_GOOGLE_CLIENT_ID' with your actual Client ID 
            // from the Google Cloud Console (APIs & Services -> Credentials)
            googleClient = google.accounts.oauth2.initTokenClient({
                client_id: 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com',
                scope: 'profile email',
                callback: (tokenResponse) => {
                    if (tokenResponse && tokenResponse.access_token) {
                        console.log("Successfully logged in with Google!");
                        localStorage.setItem('taxibot_user', "Google User");
                        window.location.href = 'chatbot.html';
                    }
                },
            });
        };

        // Wire the custom styled Google button
        document.querySelector('.google-btn').addEventListener('click', () => {
            if (googleClient) {
                googleClient.requestAccessToken();
            } else {
                console.error("Google Client not initialized yet.");
            }
        });
    </script>
</body>
</html>
