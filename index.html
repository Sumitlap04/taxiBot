<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#050508">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Login - TaxiBot</title>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-glass-card">
            
            <div class="login-header">
                <img src="logo.png" alt="TaxiBot Logo" class="login-logo">
                <h1>TaxiBot</h1>
                <p>Sign in to your AI Concierge</p>
            </div>
            
            <form id="login-form" class="login-form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <div class="forgot-password" id="forgot-pw-container">
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-primary login-btn" id="auth-submit-btn">Sign In</button>
                <p id="auth-error" style="color: #ff4d4d; font-size: 12px; margin-top: 10px; display: none;"></p>
                
                <div class="divider">
                    <span>or continue with</span>
                </div>

                <button type="button" class="btn-secondary google-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-1 7.28-2.69l-3.57-2.77c-.99.69-2.26 1.1-3.71 1.1-2.87 0-5.3-1.94-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.11c-.22-.69-.35-1.43-.35-2.11s.13-1.42.35-2.11V7.05H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.95l3.66-2.84z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.05l3.66 2.84c.87-2.6 3.3-4.51 6.16-4.51z"/></svg>
                    Google
                </button>
            </form>
            
            <div class="signup-prompt">
                <p id="toggle-auth-prompt">New to TaxiBot? <a href="#" id="toggle-auth-mode">Create an account</a></p>
            </div>
            
        </div>
    </div>
    
    <script>
        // Use Supabase keys
        const SUPABASE_URL = 'https://jcruzbcpwkfnfftnvupq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjcnV6YmNwd2tmbmZmdG52dXBxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDcxMTIsImV4cCI6MjA5MTgyMzExMn0.inyNlWVviyGZlkpPp90Mv2vRjyHwP3V3Wg4rbfY5yek';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // If already logged in, skip to chatbot
        if (localStorage.getItem('taxibot_user')) {
            window.location.href = 'chatbot.html';
        }

        // Toggle Sign In vs Sign Up mode
        let isSignUpMode = false;
        const authTitle = document.querySelector('.login-header p');
        const submitBtn = document.getElementById('auth-submit-btn');
        const promptText = document.getElementById('toggle-auth-prompt');
        const forgotPw = document.getElementById('forgot-pw-container');
        const errorMsg = document.getElementById('auth-error');

        promptText.addEventListener('click', (e) => {
            if(e.target.tagName === 'A') {
                e.preventDefault();
                isSignUpMode = !isSignUpMode;
                errorMsg.style.display = 'none';
                if (isSignUpMode) {
                    authTitle.textContent = 'Create a new AI Concierge account';
                    submitBtn.textContent = 'Sign Up';
                    promptText.innerHTML = 'Already have an account? <a href="#" id="toggle-auth-mode">Sign in</a>';
                    forgotPw.style.display = 'none';
                } else {
                    authTitle.textContent = 'Sign in to your AI Concierge';
                    submitBtn.textContent = 'Sign In';
                    promptText.innerHTML = 'New to TaxiBot? <a href="#" id="toggle-auth-mode">Create an account</a>';
                    forgotPw.style.display = 'flex';
                }
            }
        });

        // Email/Password auth powered by Supabase
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Please wait...';
            errorMsg.style.display = 'none';

            try {
                if (isSignUpMode) {
                    const { data, error } = await supabaseClient.auth.signUp({ email, password });
                    if (error) throw error;
                    if (data.user && data.user.identities && data.user.identities.length === 0) {
                        throw new Error("Account with this email already exists.");
                    }
                    alert("Account created! Please check your email for a confirmation link (if enabled), or try signing in.");
                    document.getElementById('toggle-auth-mode').click(); // switch back to login
                } else {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    
                    // Success!
                    localStorage.setItem('taxibot_user', email);
                    localStorage.setItem('taxibot_profile', JSON.stringify({ email: email, name: email.split('@')[0], picture: null }));
                    window.location.href = 'chatbot.html';
                }
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = isSignUpMode ? 'Sign Up' : 'Sign In';
            }
        });

        // Google Identity Services - Keep existing Google Flow custom logic
        let googleClient;
        window.onload = function () {
            googleClient = google.accounts.oauth2.initTokenClient({
                client_id: '371102088202-tc3ci0q7kff7h0onh2lglbt1a46q73n2.apps.googleusercontent.com',
                scope: 'profile email',
                callback: async (tokenResponse) => {
                    if (tokenResponse && tokenResponse.access_token) {
                        try {
                            const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                                headers: { Authorization: `Bearer ${tokenResponse.access_token}` }
                            });
                            const profile = await res.json();
                            
                            localStorage.setItem('taxibot_user', profile.email);
                            localStorage.setItem('taxibot_profile', JSON.stringify({
                                name: profile.name,
                                email: profile.email,
                                picture: profile.picture
                            }));

                            // Upsert into Supabase `users` table so we track Google users too
                            await supabaseClient.from('users').upsert({
                                email: profile.email,
                                name: profile.name,
                                picture: profile.picture
                            }, { onConflict: 'email' });
                            
                            window.location.href = 'chatbot.html';
                        } catch (err) {
                            console.error(err);
                            localStorage.setItem('taxibot_user', "Google User");
                            window.location.href = 'chatbot.html';
                        }
                    }
                },
            });
        };

        document.querySelector('.google-btn').addEventListener('click', () => {
            if (googleClient) googleClient.requestAccessToken();
        });
    </script>
</body>
</html>
